version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: markapuram-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: markapuram
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: markapuram-redis
    ports:
      - "6379:6379"

  meilisearch:
    image: getmeili/meilisearch:v1.8
    container_name: markapuram-meili
    environment:
      MEILI_MASTER_KEY: masterKey
    ports:
      - "7700:7700"

volumes:
  pgdata:
