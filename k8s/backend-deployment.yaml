apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: markapuram-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: markapuram-backend:latest
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: markapuram-portal
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
